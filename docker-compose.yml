services:
  api-comandvoice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-comandvoice-container
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILE_ACTIVE=prod
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      # DIRECIONA OS LOGS DO SPRING PARA O ARQUIVO INTERNO DO CONTAINER
      - LOGGING_FILE_NAME=/app/logs/application.log
    volumes:
      # CRIA A PONTE DA SUA MÁQUINA LOCAL PARA A PASTA DE LOGS DA API
      - ./logs:/app/logs
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail-container
    restart: always
    environment:
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      # O PROMTAIL LÊ DIRETO DA PASTA COMPARTILHADA LOCALMENTE
      - ./logs:/var/log/api:ro
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    depends_on:
      - api-comandvoice

  db:
    image: postgres:16-alpine
    container_name: db-comandvoice
    restart: always
    shm_size: '256mb'
    network_mode: "host"  # Faz o Postgres rodar direto na porta 5432 da máquina física
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
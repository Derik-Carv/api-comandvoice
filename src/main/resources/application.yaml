spring:
  application:
    name: api-comandvoice
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    database: POSTGRESQL
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  sql:
    init:
      mode: always
      separator: "^;"

# logs em JSON
logging:
  structured:
    format:
      console: ecs

app:
  integration:
    n8n:
      webhook-url: ${N8N_WEBHOOK_URL}
      webhook-url-receptionist: ${N8N_WEBHOOK_URL_RECEPTIONIST}